name: DSPy MLOps Automated Gatekeeper

on:
  push:
    branches:
      - main
  # 1. AWeekly Schedule (Every Monday at Midnight UTC)
  schedule:
    - cron: '0 0 * * 1' 
  workflow_dispatch:

jobs:
  optimize-and-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Optimization & Performance Gate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # The script will now exit with Error 1 if the F1-score is below threshold
          python optimizer.py

      # 2. Uploads if the "Run Optimization" step succeeded (Score > Threshold)
      - name: Upload Production-Ready Weights
        if: success() 
        uses: actions/upload-artifact@v4
        with:
          name: production-weights
          path: compiled_extractor.json

      # 3. Notify if the AI failed to meet quality standards
      - name: Quality Alert
        if: failure()
        run: echo "The model failed to meet the performance threshold. Check logs for F1-score."

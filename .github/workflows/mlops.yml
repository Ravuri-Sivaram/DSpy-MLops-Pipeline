name: DSPy Prompt Optimization Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # This allows you to manually click a button to run the pipeline on GitHub

jobs:
  optimize-prompts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dspy-ai pydantic
          pip install -U litellm 

      - name: Run DSPy Optimization Loop
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python optimizer.py

      - name: Verify Artifact Creation
        run: |
          ls -la | grep compiled_extractor.json
          echo "Pipeline executed successfully and generated optimized weights."
